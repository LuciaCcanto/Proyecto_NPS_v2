<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ya registraste tu opinión</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/css/styles.css">
</head>
<body>
<div class="survey-wrapper">
  <div class="survey-card" style="text-align:center;max-width:480px">

    <div style="font-size:3.5rem;margin-bottom:16px">✅</div>

    <h1 style="font-size:1.4rem;font-weight:800;color:var(--navy);margin-bottom:10px">
      Ya registraste tu opinión
    </h1>

    <p style="font-size:0.9rem;color:var(--text-secondary);line-height:1.65;margin-bottom:24px">
      Tu respuesta ya fue enviada anteriormente en esta sesión.<br>
      Solo se permite una participación por encuesta. ¡Gracias por tu tiempo!
    </p>

    <div style="padding:16px;background:var(--bg-secondary,#F8FAFC);border-radius:10px;border:1px solid var(--border);margin-bottom:24px">
      <p style="font-size:0.78rem;color:var(--text-muted);margin:0;line-height:1.5">
        Si crees que esto es un error, intenta desde otro navegador o contacta con el equipo de soporte.
      </p>
    </div>

    <div style="border-top:1px solid var(--border);padding-top:20px">
      <p style="font-size:0.72rem;color:var(--text-muted)">Puedes cerrar esta ventana</p>
    </div>

  </div>
</div>
</body>
</html>
