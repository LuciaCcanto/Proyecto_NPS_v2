<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Iniciar Sesión — WILEY TECNOLOGY</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/css/styles.css">
</head>
<body>
<div class="login-page">
  <div class="login-card">
    <div class="login-logo">
      <div class="login-logo-text">WILEY<span>TECNOLOGY</span></div>
      <div class="login-logo-sub">Customer Intelligence Platform</div>
    </div>

    <div class="login-title">Bienvenido</div>
    <div class="login-subtitle">Ingresa tus credenciales para acceder al panel</div>

    {% if error %}
    <div class="alert alert-danger" data-auto-dismiss="5000">
      <svg width="16" height="16" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
      </svg>
      {{ error }}
    </div>
    {% endif %}

    <form method="post" action="/login" novalidate>
      <input type="hidden" name="csrf_token" value="{{ csrf_token }}">

      <div class="form-group">
        <label class="form-label" for="email">Correo electrónico</label>
        <input
          class="form-control"
          type="email"
          id="email"
          name="email"
          placeholder="tu@empresa.com"
          required
          autocomplete="email"
        >
      </div>

      <div class="form-group">
        <label class="form-label" for="password">Contraseña</label>
        <input
          class="form-control"
          type="password"
          id="password"
          name="password"
          placeholder="••••••••"
          required
          autocomplete="current-password"
        >
      </div>

      <button type="submit" class="btn btn-primary w-full" style="margin-top:8px;justify-content:center">
        Iniciar Sesión
      </button>
    </form>

    <p style="margin-top:20px; font-size:0.72rem; color:var(--text-muted); text-align:center">
      Plataforma segura · Cifrado Argon2id · CSRF Protegido
    </p>
  </div>
</div>
<script src="/static/js/app.js"></script>
</body>
</html>
